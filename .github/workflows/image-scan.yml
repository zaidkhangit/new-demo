name: image scan
on:
  workflow_call:
jobs:
  image-scan:
    runs-on: ubuntu-latest
    steps:
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERUSER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: trivy scan
        scan-type: 'image'
        image-ref: '${{ secrets.DOCKERHUB_USER }}/github-actions-app:${{ github.ref }}
        uses: aquasecurity/trivy-action@master
        with:
          severity: 'CRITICAL'
          exit-code: '1'
