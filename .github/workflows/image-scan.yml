name: image scan
on:
  workflow_call:
jobs:
  image-scan:
    runs-on: ubuntu-latest
    steps:
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERUSER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: trivy scan
        uses: aquasecurity/trivy-action@V0.35.0
        with:
          severity: 'CRITICAL'
          exit-code: '1'
