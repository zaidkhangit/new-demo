name: Docker Build & Push 

on: 
  workflow_call: 

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4
            - name: docker login
              run: echo "${{ secrets.PASSWORD }}" | docker login -u "${{ vars.DOCKERUSER }}" --password-stdin

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERUSER }}
                password: ${{ secrets.PASSWORD }}
                
            - name: Build & Push to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}
