name: Docker Build & Push 

on: 
  workflow_call:
    secrets:
      MY_SECRET:
        required: true
jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Check secret length
              run: echo "${{ secrets.PASSWORD }}" | wc -c


            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERUSER }}
                password: ${{ secrets.DOCKER_PASSWORD }}
                
            - name: Build & Push to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.ref_name }}
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha}}
