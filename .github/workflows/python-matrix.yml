name: python-matrix
  on:
    push:
      branches: [main]
    jobs:
      lint and test
        runs-on: ubuntu-latest
        steps:
          - name: checkout code
            uses: actions/checkout@v4
          - name: setup python
            uses: actions/setup-python@v5
            with:
              python-version: "3.9"
          - name: install dependencies
            run: pip install -r  requirements.txt
          - name: lint
          - uses: flask8 app.py
            